<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
/* =============================================================
   INKWELL SPLASH  ·  two skins, one file
   ============================================================= */

html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1A1D23;
    animation: splashFadeIn 0.55s ease-out both;
}

/* ── Shared brand stack ── */
.brand-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    animation: float 3s ease-in-out infinite;
}
.mascot-img {
    width: 240px; height: auto;
    border-radius: 12px;
    transition: filter 0.7s ease;
}
.text-logo-img {
    width: 180px; height: auto;
    opacity: 0.85;
    transition: filter 0.7s ease, opacity 0.7s ease;
}
@keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
}
@keyframes splashFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

/* ── Holo-only layers (hidden by default) ── */
#holo-canvas    { display: none; position: fixed; inset: 0; z-index: 1; }
#holo-scanlines {
    display: none; position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 2px,
        rgba(0,229,255,0.016) 2px, rgba(0,229,255,0.016) 3px
    );
}
#boot-text {
    display: none;
    position: fixed; bottom: 44px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 0.16em;
    color: #00E5FF;
    text-shadow: 0 0 10px rgba(0,229,255,0.9), 0 0 24px rgba(0,229,255,0.4);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.25s ease;
}
#boot-text.visible { opacity: 1; }

/* ── Holo mode overrides ── */
body.holo-mode { background: #000810; }

body.holo-mode #holo-canvas,
body.holo-mode #holo-scanlines,
body.holo-mode #boot-text { display: block; }

body.holo-mode .mascot-img {
    filter:
        drop-shadow(0 0 22px rgba(0,229,255,0.75))
        drop-shadow(0 0  8px rgba(0,229,255,0.55))
        brightness(1.10) saturate(1.12);
}
body.holo-mode .text-logo-img {
    opacity: 1;
    filter:
        brightness(1.25) saturate(0.25)
        hue-rotate(178deg)
        drop-shadow(0 0 14px rgba(0,229,255,0.9));
}
body.holo-mode .brand-container {
    filter: drop-shadow(0 0 55px rgba(0,160,255,0.13));
}
</style>
</head>

<script>

/* ── Read saved holo mode before first paint ──
   _injectedHoloMode is set by Python (inkwell_app_config.json) before the
   window is created, so it is always reliable.  localStorage is kept as a
   belt-and-suspenders fallback for dev/browser testing.              */
var _splashMode = 'off';
try {
    _splashMode = (window._injectedHoloMode && window._injectedHoloMode !== 'off')
        ? window._injectedHoloMode
        : (localStorage.getItem('inkwell-holo-mode') || 'off');
} catch(e) {
    _splashMode = window._injectedHoloMode || 'off';
}

if (_splashMode !== 'off') {
    document.body.classList.add('holo-mode');
    _runHoloSplash();
}

function _runHoloSplash() {
    var canvas = document.getElementById('holo-canvas');
    var ctx    = canvas.getContext('2d');
    var W, H;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ── Particles ── */
    var PART_COUNT = 130;
    var parts = [];
    for (var i = 0; i < PART_COUNT; i++) {
        var isMag = Math.random() < 0.08;
        var tint  = Math.random();
        parts.push({
            x: Math.random(), y: Math.random(),
            vx: (Math.random()-0.5)*0.00045,
            vy: (Math.random()-0.5)*0.00032,
            r:  Math.random()*1.8 + 0.5,
            phase: Math.random()*6.2832,
            speed: 0.6 + Math.random()*1.2,
            alpha: 0.18 + Math.random()*0.5,
            isMag: isMag,
            rc: isMag ? 1.0        : tint*0.38,
            gc: isMag ? 0.15       : 0.65+tint*0.35,
            bc: 1.0
        });
    }

    /* ── Perspective grid ── */
    function drawGrid(t) {
        var horizon = H * 0.62;
        var vpX     = W * 0.5;
        var VLINES  = 22;
        ctx.save();

        /* Vertical lines converging to vanishing point */
        for (var vi = 0; vi <= VLINES; vi++) {
            var bx = (vi / VLINES) * W;
            var a  = 0.09 + 0.06*Math.sin(t*0.4 + vi*0.28);
            ctx.beginPath();
            ctx.moveTo(bx, H);
            ctx.lineTo(vpX + (bx - vpX)*0.04, horizon);
            ctx.strokeStyle = 'rgba(0,200,255,' + a + ')';
            ctx.lineWidth   = 0.5;
            ctx.stroke();
        }

        /* Horizontal lines — slow scroll toward camera */
        var scroll = (t * 0.9) % 1;
        for (var hi = 0; hi < 22; hi++) {
            var p  = ((hi / 21) + scroll) % 1;
            var y  = horizon + Math.pow(p, 1.55) * (H - horizon);
            var ha = (1 - p)*0.22 + 0.02;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.strokeStyle = 'rgba(0,180,255,' + ha + ')';
            ctx.lineWidth   = 0.5;
            ctx.stroke();
        }

        /* Horizon glow line */
        var hg = ctx.createLinearGradient(0, 0, W, 0);
        hg.addColorStop(0,    'rgba(0,229,255,0)');
        hg.addColorStop(0.25, 'rgba(0,229,255,0.35)');
        hg.addColorStop(0.5,  'rgba(0,229,255,0.55)');
        hg.addColorStop(0.75, 'rgba(0,229,255,0.35)');
        hg.addColorStop(1,    'rgba(0,229,255,0)');
        ctx.beginPath();
        ctx.moveTo(0, horizon); ctx.lineTo(W, horizon);
        ctx.strokeStyle = hg;
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        ctx.restore();
    }

    /* ── Main loop ── */
    var t = 0;
    function draw() {
        requestAnimationFrame(draw);
        t += 0.016;
        W = canvas.width; H = canvas.height;

        /* Background */
        ctx.fillStyle = '#000810';
        ctx.fillRect(0, 0, W, H);

        /* Radial vignette */
        var vg = ctx.createRadialGradient(W/2, H/2, H*0.18, W/2, H/2, H*0.9);
        vg.addColorStop(0, 'rgba(0,8,16,0)');
        vg.addColorStop(1, 'rgba(0,3,10,0.92)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);

        drawGrid(t);

        /* Particles — gaussian glow via shadow */
        for (var i = 0; i < parts.length; i++) {
            var p  = parts[i];
            p.x   += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
            if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;

            var tw = 0.42 + 0.58*Math.sin(t*p.speed + p.phase);
            var a  = (p.alpha * tw).toFixed(3);
            var rc = Math.round(p.rc*255);
            var gc = Math.round(p.gc*255);

            ctx.save();
            ctx.shadowBlur  = 8;
            ctx.shadowColor = p.isMag ? '#FF2D78' : '#00E5FF';
            ctx.beginPath();
            ctx.arc(p.x*W, p.y*H, p.r, 0, 6.2832);
            ctx.fillStyle = 'rgba('+rc+','+gc+',255,'+a+')';
            ctx.fill();
            ctx.restore();
        }
    }
    draw();

    /* ── Boot text sequence ── */
    var bootEl = document.getElementById('boot-text');
    var lines  = [
        '▸ INKWELL NEURAL INTERFACE  v∞',
        '▸ LOADING PROJECT DATABASE  ...',
        '▸ HOLOGRAPHIC MATRIX  [ ONLINE ]'
    ];
    lines.forEach(function(line, i) {
        setTimeout(function() {
            bootEl.textContent = line;
            bootEl.classList.add('visible');
        }, 320 + i*420);
    });
}

</script>
