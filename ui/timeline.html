<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>
<style>

/* ── RESET & VARIABLES ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #1A1D23;
  --bg2:         #1E2229;
  --bg3:         #22262D;
  --surface:     #252A33;
  --surface2:    #2D3340;
  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.13);
  --text:        #D4D8E8;
  --text2:       #9097A8;
  --text3:       #5C6270;
  --accent:      #00C2FF;
  --radius:      8px;
  --header-h:    44px;
  --lane-hdr-w:  150px;
  --card-w:      168px;
  --card-h:      128px;
}

/* ── HOLO ──────────────────────────────────────────────────────── */
body.holo-mode, body.holo-max-mode {
  --bg:      #060A12;
  --bg2:     #080D18;
  --bg3:     #090E1C;
  --surface: #0C1422;
  --surface2:#10192E;
  --border:  rgba(0,229,255,0.10);
  --border2: rgba(0,229,255,0.22);
  --text:    #C0DEFF;
  --text2:   #6899BB;
  --text3:   #2E5070;
  --accent:  #00E5FF;
}

/* ── BASE ──────────────────────────────────────────────────────── */
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ── TITLE BAR ─────────────────────────────────────────────────── */
#titlebar {
  height: var(--header-h);
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px 0 14px;
  gap: 6px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

#drag-region {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: default;
  -webkit-app-region: drag;
  app-region: drag;
}

.tl-icon { font-size: 15px; }

.tb-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  -webkit-app-region: no-drag;
}

.tb-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  font-family: inherit;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.tb-btn.sync-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.close-btn { border-color: transparent; font-size: 14px; padding: 4px 9px; }
.tb-btn.close-btn:hover { background: rgba(220,50,50,0.22); color: #ff7070; }
.tb-btn.zoom-btn { padding: 3px 9px; font-size: 14px; }

.tb-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

#dirty-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  display: none;
  box-shadow: 0 0 6px var(--accent);
}
#dirty-dot.visible { display: block; }

body.holo-mode #titlebar,
body.holo-max-mode #titlebar {
  border-bottom-color: rgba(0,229,255,0.18);
  box-shadow: 0 1px 24px rgba(0,229,255,0.06);
}

/* ── BODY LAYOUT ───────────────────────────────────────────────── */
#tl-body {
  display: flex;
  flex-direction: column;
  height: calc(100vh - var(--header-h));
  overflow: hidden;
}

/* ── SWIMLANES SCROLL ──────────────────────────────────────────── */
#swimlanes-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 0 20px;
}

#swimlanes-scroll::-webkit-scrollbar { width: 5px; }
#swimlanes-scroll::-webkit-scrollbar-track { background: transparent; }
#swimlanes-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
#swimlanes-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ── SWIMLANE ROW ──────────────────────────────────────────────── */
.swimlane {
  display: flex;
  align-items: stretch;
  min-height: calc(var(--card-h) + 28px);
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.swimlane:last-child { border-bottom: none; }
.swimlane.drag-target { background: rgba(0,200,255,0.035); }

body.holo-mode .swimlane,
body.holo-max-mode .swimlane { border-bottom-color: rgba(0,229,255,0.07); }
body.holo-mode .swimlane.drag-target,
body.holo-max-mode .swimlane.drag-target { background: rgba(0,229,255,0.04); }

/* ── LANE HEADER ───────────────────────────────────────────────── */
.lane-header {
  width: var(--lane-hdr-w);
  flex-shrink: 0;
  background: var(--bg3);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 14px 10px;
}

.lane-color-bar {
  width: 3px;
  height: 34px;
  border-radius: 2px;
}

.lane-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  word-break: break-word;
  line-height: 1.4;
  max-width: 100%;
}
.lane-unassigned .lane-name {
  color: var(--text3);
  font-weight: 400;
  font-style: italic;
}

.lane-count {
  font-size: 10px;
  color: var(--text3);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 7px;
}

body.holo-mode .lane-header,
body.holo-max-mode .lane-header {
  background: rgba(4,10,24,0.97);
  border-right-color: rgba(0,229,255,0.12);
}

/* ── CARDS AREA ────────────────────────────────────────────────── */
.lane-cards {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  overflow-y: hidden;
  min-height: calc(var(--card-h) + 28px);
}

.lane-cards::-webkit-scrollbar { height: 3px; }
.lane-cards::-webkit-scrollbar-track { background: transparent; }
.lane-cards::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── CHAPTER CARD ──────────────────────────────────────────────── */
.chapter-card {
  flex-shrink: 0;
  width: var(--card-w);
  height: var(--card-h);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  cursor: grab;
  transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s, border-color 0.12s;
  overflow: hidden;
  position: relative;
}

.chapter-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 18px rgba(0,0,0,0.32);
  transform: translateY(-2px);
}

.chapter-card.dragging {
  opacity: 0.25;
  cursor: grabbing;
}

/* Top POV colour bar */
.card-pov-bar {
  height: 3px;
  flex-shrink: 0;
  width: 100%;
}

.card-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 7px 9px 8px;
  gap: 3px;
  overflow: hidden;
}

.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.card-synopsis {
  font-size: 10px;
  color: var(--text2);
  line-height: 1.45;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  flex: 1;
}

.card-footer {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
  flex-shrink: 0;
}

.card-status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.card-wc {
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.3px;
  flex-shrink: 0;
}

.card-mood {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 4px;
  flex-shrink: 0;
  text-transform: capitalize;
  white-space: nowrap;
}

.card-pov-btn {
  margin-left: auto;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  outline: none;
  white-space: nowrap;
  max-width: 76px;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.card-pov-btn:hover { opacity: 0.7; }

/* Holo card */
body.holo-mode .chapter-card,
body.holo-max-mode .chapter-card {
  background: rgba(8,16,34,0.92);
  border-color: rgba(0,229,255,0.12);
}
body.holo-mode .chapter-card:hover,
body.holo-max-mode .chapter-card:hover {
  border-color: rgba(0,229,255,0.38);
  box-shadow: 0 0 18px rgba(0,229,255,0.10), 0 4px 20px rgba(0,0,0,0.45);
}

/* ── DROP INDICATOR ─────────────────────────────────────────────── */
.drop-indicator {
  width: 3px;
  min-width: 3px;
  height: var(--card-h);
  background: var(--accent);
  border-radius: 2px;
  box-shadow: 0 0 10px var(--accent);
  pointer-events: none;
  flex-shrink: 0;
  transition: height 0.1s;
}

/* ── EMPTY LANE HINT ────────────────────────────────────────────── */
.empty-lane-hint {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  padding: 8px 18px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  pointer-events: none;
  white-space: nowrap;
}

/* ── POV POPUP ─────────────────────────────────────────────────── */
#pov-popup {
  position: fixed;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 6px 6px;
  min-width: 164px;
  max-width: 230px;
  box-shadow: 0 8px 36px rgba(0,0,0,0.45);
  z-index: 10000;
  display: none;
  flex-direction: column;
  gap: 2px;
}
#pov-popup.open { display: flex; }

.pov-popup-hdr {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.7px;
  padding: 0 6px 5px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3px;
}

.pov-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text);
  transition: background 0.1s;
}
.pov-opt:hover { background: var(--surface2); }
.pov-opt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pov-opt-check { margin-left: auto; color: var(--accent); font-size: 10px; }

.pov-clear {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  color: var(--text3);
  transition: background 0.1s, color 0.1s;
  margin-top: 2px;
  border-top: 1px solid var(--border);
  padding-top: 6px;
}
.pov-clear:hover { background: rgba(220,50,50,0.12); color: #ff7070; }

.pov-new-row {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  padding-top: 5px;
  border-top: 1px solid var(--border);
}
.pov-new-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 5px;
  outline: none;
  font-family: inherit;
}
.pov-new-input:focus { border-color: var(--accent); }
.pov-new-add {
  background: var(--accent);
  border: none;
  color: #000;
  font-size: 11px;
  padding: 4px 9px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
}

body.holo-mode #pov-popup,
body.holo-max-mode #pov-popup {
  border-color: rgba(0,229,255,0.28);
  box-shadow: 0 0 30px rgba(0,229,255,0.08), 0 8px 36px rgba(0,0,0,0.6);
}

/* ── SYNC TOAST ─────────────────────────────────────────────────── */
#sync-toast {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 12px;
  padding: 8px 14px;
  border-radius: var(--radius);
  display: none;
  align-items: center;
  gap: 7px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  z-index: 9999;
  pointer-events: none;
}
#sync-toast.visible { display: flex; }
.toast-ok { color: #3DAA74; font-size: 13px; }

/* ── EMPTY STATE ────────────────────────────────────────────────── */
#empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 14px;
  color: var(--text3);
  pointer-events: none;
}
#empty-state.show { display: flex; }
.es-icon { font-size: 46px; opacity: 0.3; }
.es-msg  { font-size: 14px; }

</style>
</head>
<body class="theme-normal">

<!-- TITLE BAR -->
<div id="titlebar">
  <div id="drag-region" class="pywebview-drag-region">
    <span class="tl-icon">📅</span>
    <span>Story Timeline</span>
  </div>
  <div class="tb-actions">
    <span id="dirty-dot" title="Unsynced changes"></span>
    <button class="tb-btn sync-btn" onclick="syncNow()" title="Save chapter order to project (auto-saves after 2 s)">↻ Sync</button>
    <div class="tb-divider"></div>
    <button class="tb-btn zoom-btn" onclick="adjustZoom(-0.15)" title="Smaller cards">−</button>
    <button class="tb-btn zoom-btn" onclick="adjustZoom(+0.15)" title="Larger cards">+</button>
    <div class="tb-divider"></div>
    <button class="tb-btn close-btn" onclick="closeSelf()" title="Close">✕</button>
  </div>
</div>

<!-- SWIMLANES -->
<div id="tl-body">
  <div id="swimlanes-scroll">
    <div id="swimlanes"></div>
    <div id="empty-state">
      <div class="es-icon">📅</div>
      <div class="es-msg">No chapters in this project yet.</div>
    </div>
  </div>
</div>

<!-- POV POPUP -->
<div id="pov-popup">
  <div class="pov-popup-hdr">Assign POV Character</div>
  <div id="pov-options-list"></div>
  <div class="pov-clear" onclick="applyPov('')">✕&nbsp; Clear POV</div>
  <div class="pov-new-row">
    <input class="pov-new-input" id="pov-new-input"
           placeholder="New POV name…"
           onkeydown="if(event.key==='Enter'){addNewPov();event.stopPropagation();}">
    <button class="pov-new-add" onclick="addNewPov()">+</button>
  </div>
</div>

<!-- SYNC TOAST -->
<div id="sync-toast">
  <span class="toast-ok">✓</span>
  <span>Timeline synced to project</span>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   DATA & STATE
═══════════════════════════════════════════════════════════════ */
var chapters      = [];
var dirty         = false;
var isHolo        = false;
var _cardZoom     = 1.0;
var MIN_ZOOM = 0.65, MAX_ZOOM = 1.7;

var _povPopChId   = null;   // chapter id the POV popup is for
var _syncTimer    = null;
var _toastTimer   = null;
var _dragId       = null;

// Stable per-POV colour index  (assigned in order of first appearance)
var _povColorMap  = {};     // { povName : colorIndex }
var _nextColorIdx = 0;

var POV_COLORS_N = ['#5B8DD9','#9B6DDB','#3DAA74','#D97B2A','#C94040','#C8A030','#2AB5C0','#AA5BAA'];
var POV_COLORS_H = ['#00AAFF','#CC44FF','#00EE88','#FF8800','#FF3366','#FFD700','#00FFEE','#FF66CC'];

var STATUS_COLOR = { draft:'#7A8196', revising:'#F0A500', done:'#3DAA74' };
var MOOD_COLOR   = {
  Tense:'#C94040', Melancholy:'#6080BB', Euphoric:'#C8A030',
  Mysterious:'#9B6DDB', Dread:'#882222', Wonder:'#3DAA74'
};

/* ═══════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════ */
window.syncTheme = function(theme) {
  document.body.className = '';
  if (theme === 'holo' || theme === 'holo-lite') {
    document.body.classList.add('holo-mode');     isHolo = true;
  } else if (theme === 'holo-max') {
    document.body.classList.add('holo-max-mode'); isHolo = true;
  } else {
    document.body.classList.add('theme-normal');  isHolo = false;
  }
};

/* ═══════════════════════════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════════════════════════ */
function adjustZoom(d) {
  _cardZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, _cardZoom + d));
  var cw = Math.round(168 * _cardZoom);
  var ch = Math.round(128 * _cardZoom);
  document.documentElement.style.setProperty('--card-w', cw + 'px');
  document.documentElement.style.setProperty('--card-h', ch + 'px');
}

/* ═══════════════════════════════════════════════════════════════
   COLOURS
═══════════════════════════════════════════════════════════════ */
function getPovColor(pov) {
  if (!pov) return isHolo ? '#1A3A5A' : '#3A3F4A';
  if (!(pov in _povColorMap)) { _povColorMap[pov] = _nextColorIdx++; }
  var idx = _povColorMap[pov] % POV_COLORS_N.length;
  return isHolo ? POV_COLORS_H[idx] : POV_COLORS_N[idx];
}

function getAllPovs() {
  var seen = {}, list = [];
  chapters.forEach(function(c) { if (c.pov && !seen[c.pov]) { seen[c.pov]=1; list.push(c.pov); } });
  return list;
}

/* ═══════════════════════════════════════════════════════════════
   HTML ESCAPE
═══════════════════════════════════════════════════════════════ */
function _esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═══════════════════════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════════════════════ */
function loadData() {
  if (!window.pywebview) { setTimeout(loadData, 80); return; }
  pywebview.api.get_timeline_data().then(function(res) {
    if (!res || !res.chapters) return;
    chapters = res.chapters;
    // Seed stable POV colours in chapter order
    chapters.forEach(function(c) { if (c.pov) getPovColor(c.pov); });
    render();
  }).catch(function(e) { console.error('[Timeline] get_timeline_data error', e); });
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════ */
function render() {
  var container  = document.getElementById('swimlanes');
  var emptyState = document.getElementById('empty-state');
  container.innerHTML = '';

  if (!chapters.length) { emptyState.classList.add('show'); return; }
  emptyState.classList.remove('show');

  // Collect POVs in order of first appearance; push '' (unassigned) last
  var orderedPovs = [], seen = {};
  chapters.forEach(function(c) {
    var p = c.pov || '';
    if (p && !seen[p]) { seen[p]=1; orderedPovs.push(p); }
  });
  orderedPovs.push('');  // Unassigned always last

  orderedPovs.forEach(function(pov) {
    var chs = chapters.filter(function(c) { return (c.pov||'')=== pov; });
    container.appendChild(buildSwimlane(pov, chs));
  });

  setupDropZones();
}

/* ═══════════════════════════════════════════════════════════════
   BUILD SWIMLANE
═══════════════════════════════════════════════════════════════ */
function buildSwimlane(pov, chs) {
  var lane = document.createElement('div');
  lane.className = 'swimlane' + (pov === '' ? ' lane-unassigned' : '');
  lane.dataset.pov = pov;

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'lane-header';
  var col = pov ? getPovColor(pov) : 'transparent';
  hdr.innerHTML =
    '<div class="lane-color-bar" style="background:' + col + '"></div>' +
    '<div class="lane-name">'  + (pov ? _esc(pov) : 'Unassigned') + '</div>' +
    '<div class="lane-count">' + chs.length + '</div>';

  // Cards
  var cardsEl = document.createElement('div');
  cardsEl.className = 'lane-cards';
  cardsEl.dataset.pov = pov;

  if (!chs.length) {
    var hint = document.createElement('div');
    hint.className = 'empty-lane-hint';
    hint.textContent = 'Drop chapters here';
    cardsEl.appendChild(hint);
  } else {
    chs.forEach(function(ch) { cardsEl.appendChild(buildCard(ch)); });
  }

  lane.appendChild(hdr);
  lane.appendChild(cardsEl);
  return lane;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD CARD
═══════════════════════════════════════════════════════════════ */
function buildCard(ch) {
  var card = document.createElement('div');
  card.className = 'chapter-card';
  card.dataset.id = ch.id;
  card.draggable = true;
  card.title = (ch.title || 'Untitled') + (ch.synopsis ? '\n' + ch.synopsis : '');

  var pov        = ch.pov || '';
  var povCol     = pov ? getPovColor(pov) : '';
  var statusCol  = STATUS_COLOR[ch.status] || '#7A8196';
  var wc         = ch.wordCount || 0;
  var wcStr      = wc >= 1000 ? (wc/1000).toFixed(1).replace(/\.0$/,'')+'k' : (wc > 0 ? wc+'w' : '—');
  var moodCol    = ch.mood ? (MOOD_COLOR[ch.mood] || 'var(--text3)') : '';
  var barBg      = pov ? povCol : 'transparent';
  var povBtnCol  = pov ? povCol : 'var(--text3)';
  var povBtnBdr  = pov ? povCol : 'var(--border)';

  card.innerHTML =
    '<div class="card-pov-bar" style="background:' + barBg + '"></div>' +
    '<div class="card-inner">' +
      '<div class="card-title">' + _esc(ch.title || 'Untitled') + '</div>' +
      '<div class="card-synopsis">' + _esc(ch.synopsis || '') + '</div>' +
      '<div class="card-footer">' +
        '<span class="card-status-dot" style="background:' + statusCol + '" title="' + _esc(ch.status||'draft') + '"></span>' +
        '<span class="card-wc">' + _esc(wcStr) + '</span>' +
        (ch.mood ? '<span class="card-mood" style="background:' + moodCol + '22;color:' + moodCol + '">' + _esc(ch.mood) + '</span>' : '') +
        '<button class="card-pov-btn" ' +
          'style="color:' + povBtnCol + ';border-color:' + povBtnBdr + '" ' +
          'onclick="openPovPopup(event,\'' + ch.id + '\')" ' +
          'title="Assign POV">' + _esc(pov || '+ POV') + '</button>' +
      '</div>' +
    '</div>';

  card.addEventListener('dragstart', onDragStart);
  card.addEventListener('dragend',   onDragEnd);
  card.addEventListener('dblclick',  function() {
    if (window.pywebview) pywebview.api.jump_to_chapter(ch.id);
  });

  return card;
}

/* ═══════════════════════════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════════════════════════ */
function onDragStart(e) {
  _dragId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _dragId);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  _dragId = null;
  document.querySelectorAll('.lane-cards').forEach(function(el) {
    el.classList.remove('drag-over');
  });
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  document.querySelectorAll('.swimlane').forEach(function(el) { el.classList.remove('drag-target'); });
}

function setupDropZones() {
  document.querySelectorAll('.lane-cards').forEach(function(el) {
    el.addEventListener('dragover',   onLaneDragOver);
    el.addEventListener('dragleave',  onLaneDragLeave);
    el.addEventListener('drop',       onLaneDrop);
  });
}

function getInsertBeforeId(cardsEl, clientX) {
  var cards = Array.prototype.slice.call(
    cardsEl.querySelectorAll('.chapter-card:not(.dragging)')
  );
  for (var i = 0; i < cards.length; i++) {
    var r = cards[i].getBoundingClientRect();
    if (clientX < r.left + r.width / 2) return cards[i].dataset.id;
  }
  return null;
}

function onLaneDragOver(e) {
  if (!_dragId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  var cardsEl = e.currentTarget;
  cardsEl.parentElement.classList.add('drag-target');

  // Refresh drop indicator
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  var insertBeforeId = getInsertBeforeId(cardsEl, e.clientX);

  var ind = document.createElement('div');
  ind.className = 'drop-indicator';

  if (insertBeforeId) {
    var beforeEl = cardsEl.querySelector('[data-id="' + insertBeforeId + '"]');
    if (beforeEl) cardsEl.insertBefore(ind, beforeEl);
    else cardsEl.appendChild(ind);
  } else {
    var hint = cardsEl.querySelector('.empty-lane-hint');
    if (hint) cardsEl.insertBefore(ind, hint);
    else cardsEl.appendChild(ind);
  }
}

function onLaneDragLeave(e) {
  var cardsEl = e.currentTarget;
  if (!cardsEl.contains(e.relatedTarget)) {
    cardsEl.parentElement.classList.remove('drag-target');
    cardsEl.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  }
}

function onLaneDrop(e) {
  e.preventDefault();
  if (!_dragId) return;

  var cardsEl = e.currentTarget;
  var targetPov = cardsEl.dataset.pov || '';
  cardsEl.parentElement.classList.remove('drag-target');
  cardsEl.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });

  var insertBeforeId = getInsertBeforeId(cardsEl, e.clientX);
  moveChapter(_dragId, targetPov, insertBeforeId);
}

/* ═══════════════════════════════════════════════════════════════
   MOVE CHAPTER (reorder + rePOV)
═══════════════════════════════════════════════════════════════ */
function moveChapter(chId, targetPov, insertBeforeId) {
  var idx = -1;
  for (var i = 0; i < chapters.length; i++) { if (chapters[i].id === chId) { idx = i; break; } }
  if (idx < 0) return;

  var dragged = chapters.splice(idx, 1)[0];
  dragged.pov = targetPov;

  if (insertBeforeId) {
    var ti = -1;
    for (var j = 0; j < chapters.length; j++) { if (chapters[j].id === insertBeforeId) { ti = j; break; } }
    if (ti >= 0) chapters.splice(ti, 0, dragged);
    else         chapters.push(dragged);
  } else {
    // Append after the last chapter currently in the target lane
    var laneItems = chapters.filter(function(c) { return (c.pov||'')=== targetPov; });
    if (laneItems.length > 0) {
      var lastId  = laneItems[laneItems.length - 1].id;
      var lastIdx = -1;
      for (var k = 0; k < chapters.length; k++) { if (chapters[k].id === lastId) { lastIdx = k; break; } }
      chapters.splice(lastIdx + 1, 0, dragged);
    } else {
      chapters.push(dragged);
    }
  }

  markDirty();
  render();
  scheduleAutoSync();
}

/* ═══════════════════════════════════════════════════════════════
   POV POPUP
═══════════════════════════════════════════════════════════════ */
function openPovPopup(e, chId) {
  e.stopPropagation();
  _povPopChId = chId;

  var popup    = document.getElementById('pov-popup');
  var listEl   = document.getElementById('pov-options-list');
  listEl.innerHTML = '';

  var allPovs = getAllPovs();
  var curPov  = '';
  for (var i = 0; i < chapters.length; i++) {
    if (chapters[i].id === chId) { curPov = chapters[i].pov || ''; break; }
  }

  allPovs.forEach(function(pov) {
    var opt = document.createElement('div');
    opt.className = 'pov-opt';
    opt.innerHTML =
      '<div class="pov-opt-dot" style="background:' + getPovColor(pov) + '"></div>' +
      '<span>' + _esc(pov) + '</span>' +
      (pov === curPov ? '<span class="pov-opt-check">✓</span>' : '');
    (function(p) { opt.onclick = function() { applyPov(p); }; })(pov);
    listEl.appendChild(opt);
  });

  document.getElementById('pov-new-input').value = '';

  // Position popup below button, clamped to viewport
  var rect = e.target.getBoundingClientRect();
  var left = Math.min(rect.left, window.innerWidth  - 250);
  var top  = Math.min(rect.bottom + 4, window.innerHeight - 220);
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
  popup.classList.add('open');

  setTimeout(function() {
    document.addEventListener('click', _povOutsideHandler);
  }, 0);
}

function _povOutsideHandler(e) {
  var popup = document.getElementById('pov-popup');
  if (!popup.contains(e.target)) {
    popup.classList.remove('open');
    _povPopChId = null;
    document.removeEventListener('click', _povOutsideHandler);
  }
}

function applyPov(pov) {
  if (!_povPopChId) return;
  var ch = null;
  for (var i = 0; i < chapters.length; i++) {
    if (chapters[i].id === _povPopChId) { ch = chapters[i]; break; }
  }
  if (ch) {
    ch.pov = pov;
    markDirty();
    render();
    scheduleAutoSync();
  }
  document.getElementById('pov-popup').classList.remove('open');
  document.removeEventListener('click', _povOutsideHandler);
  _povPopChId = null;
}

function addNewPov() {
  var val = (document.getElementById('pov-new-input').value || '').trim();
  if (!val || !_povPopChId) return;
  applyPov(val);
}

/* ═══════════════════════════════════════════════════════════════
   DIRTY / SYNC
═══════════════════════════════════════════════════════════════ */
function markDirty() {
  dirty = true;
  document.getElementById('dirty-dot').classList.add('visible');
}

function scheduleAutoSync() {
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncNow, 2000);
}

function syncNow() {
  if (_syncTimer) { clearTimeout(_syncTimer); _syncTimer = null; }
  if (!window.pywebview) return;
  var data = chapters.map(function(c) { return { id: c.id, pov: c.pov || '' }; });
  pywebview.api.save_timeline_order(data).then(function() {
    dirty = false;
    document.getElementById('dirty-dot').classList.remove('visible');
    showToast();
  }).catch(function(e) { console.error('[Timeline] save error', e); });
}

function showToast() {
  var t = document.getElementById('sync-toast');
  t.classList.add('visible');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('visible'); }, 2400);
}

/* ═══════════════════════════════════════════════════════════════
   CLOSE
═══════════════════════════════════════════════════════════════ */
function closeSelf() {
  if (dirty) syncNow();
  if (window.pywebview) pywebview.api.close_satellite_window('Timeline');
}

/* ═══════════════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var popup = document.getElementById('pov-popup');
    if (popup.classList.contains('open')) {
      popup.classList.remove('open');
      document.removeEventListener('click', _povOutsideHandler);
      _povPopChId = null;
    } else {
      closeSelf();
    }
  }
});

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  // Apply injected holo mode immediately (set by Python before HTML loads)
  var injected = window._injectedHoloMode;
  if (injected && injected !== 'off') window.syncTheme(injected);

  function _boot() {
    // Ask Python for the definitive theme (handles mid-session theme changes)
    if (window.pywebview && window.pywebview.api && window.pywebview.api.get_app_theme) {
      pywebview.api.get_app_theme().then(function(t) { window.syncTheme(t || 'off'); }).catch(function(){});
    }
    loadData();
  }

  if (window.pywebview) _boot();
  else window.addEventListener('pywebviewready', _boot);
});
</script>
