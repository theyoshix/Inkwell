<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* ── THEME VARIABLES ──────────────────────────────────────────── */
        :root {
            --bg-main:#1A1D23; --bg-surface:#1F222A; --bg-panel:rgba(30,33,40,0.75);
            --bg-topbar:rgba(26,29,35,0.97); --text-main:#D4D4D4; --text-muted:#7A7A7A;
            --accent:#4DA8E0; --accent-alt:rgba(0,122,204,0.4); --accent-bg:rgba(0,122,204,0.12);
            --border-main:rgba(255,255,255,0.05); --border-light:rgba(255,255,255,0.1);
            --sb-thumb:rgba(255,255,255,0.07); --sb-thumb-hover:rgba(255,255,255,0.13);
        }
        [data-theme="light"] {
            --bg-main:#E9EAEF; --bg-surface:#FFF; --bg-panel:#F1F2F6; --bg-topbar:#FFF;
            --text-main:#1A1C20; --text-muted:#585F6B; --accent:#2563EB;
            --accent-alt:rgba(37,99,235,.1); --accent-bg:#DBEAFE;
            --border-main:rgba(0,0,0,.15); --border-light:rgba(0,0,0,.25);
        }
        [data-theme="parchment"],[data-theme="vellum"] {
            --bg-main:#F4ECD8; --bg-surface:#EBE1C9; --bg-topbar:rgba(244,236,216,.97);
            --text-main:#3C3C3C; --text-muted:#7D705E; --accent:#A67C52;
            --accent-bg:rgba(166,124,82,.15); --border-main:rgba(0,0,0,.05); --border-light:rgba(0,0,0,.1);
        }
        [data-theme="nord"] { --bg-main:#2E3440; --bg-surface:#3B4252; --bg-topbar:rgba(46,52,64,.97); --text-main:#ECEFF4; --text-muted:#616E88; --accent:#88C0D0; --accent-bg:rgba(136,192,208,.15); --border-main:rgba(255,255,255,.03); }
        [data-theme="sakura"] { --bg-main:#2D242F; --bg-surface:#382D3A; --bg-topbar:rgba(45,36,47,.97); --text-main:#F8E1F4; --text-muted:#8A758D; --accent:#D391D3; --accent-bg:rgba(211,145,211,.15); --border-main:rgba(255,255,255,.05); }
        [data-theme="forest"] { --bg-main:#141E14; --bg-surface:#1B261B; --bg-topbar:rgba(20,30,20,.97); --text-main:#D1D5DB; --text-muted:#6B7280; --accent:#4ADE80; --accent-bg:rgba(74,222,128,.15); --border-main:rgba(255,255,255,.03); }
        [data-theme="midnight"] { --bg-main:#070A18; --bg-surface:#111530; --bg-topbar:rgba(7,10,24,.97); --text-main:#C8D8F8; --text-muted:#445068; --accent:#7BA7F0; --accent-bg:rgba(123,167,240,.12); --border-main:rgba(123,167,240,.06); }
        [data-theme="crimson"] { --bg-main:#0E0808; --bg-surface:#1C1010; --bg-topbar:rgba(14,8,8,.97); --text-main:#F0D8D8; --text-muted:#684848; --accent:#C44D3A; --accent-bg:rgba(196,77,58,.12); --border-main:rgba(196,77,58,.08); }
        [data-theme="monochrome"] { --bg-main:#080808; --bg-surface:#181818; --bg-topbar:rgba(8,8,8,.97); --text-main:#C8C8C8; --text-muted:#484848; --accent:#A0A0A0; --accent-bg:rgba(160,160,160,.1); }
        [data-style^="holo"] {
            --bg-main:#000810; --bg-surface:#001428; --bg-topbar:rgba(0,6,16,.96);
            --text-main:#A8E8FF; --text-muted:#2D6880; --accent:#00E5FF;
            --accent-bg:rgba(0,229,255,.08); --border-main:rgba(0,229,255,.08); --border-light:rgba(0,229,255,.18);
            --sb-thumb:rgba(0,229,255,.18); --sb-thumb-hover:rgba(0,229,255,.38);
        }

        * { box-sizing: border-box; }
        body { margin:0; padding:0; background:var(--bg-main); color:var(--text-main);
               font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
               height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--sb-thumb); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--sb-thumb-hover); }
        [data-style^="holo"] ::-webkit-scrollbar { width:2px; }
        [data-style^="holo"] ::-webkit-scrollbar-thumb { background:rgba(0,229,255,.28); border-radius:0; box-shadow:0 0 4px rgba(0,229,255,.5); }
        button { outline:none; font-family:'Segoe UI',sans-serif; }

        /* ── TOP BAR ──────────────────────────────────────────────── */
        .top-bar { background:var(--bg-topbar); height:48px; min-height:48px; display:flex;
                   justify-content:space-between; align-items:center; padding:0 0 0 15px;
                   border-bottom:1px solid var(--border-main); user-select:none; flex-shrink:0; }
        [data-style^="holo"] .top-bar { border-bottom:1px solid rgba(0,229,255,.14)!important; box-shadow:0 1px 14px rgba(0,229,255,.06); }
        .wc-btn { width:46px; height:48px; display:flex; align-items:center; justify-content:center;
                  background:transparent; border:none; color:var(--text-muted); font-size:13px;
                  cursor:pointer; transition:background .15s,color .15s; }
        .wc-btn:hover { background:var(--border-light); color:var(--text-main); }
        .wc-close:hover { background:#C42B1C!important; color:#FFF!important; }

        /* ── TOOLBAR ──────────────────────────────────────────────── */
        .dash-toolbar { display:flex; align-items:center; gap:12px; padding:12px 20px;
                        border-bottom:1px solid var(--border-main); flex-shrink:0; flex-wrap:wrap; }
        .dash-search { flex:1; min-width:180px; background:rgba(255,255,255,.04);
                       border:1px solid var(--border-main); border-radius:5px;
                       padding:6px 12px; color:var(--text-main); font-size:12px;
                       font-family:'Segoe UI',sans-serif; outline:none; transition:.2s; }
        .dash-search:focus { border-color:var(--accent); background:rgba(255,255,255,.07); }
        .dash-search::placeholder { color:var(--text-muted); }
        [data-style^="holo"] .dash-search { caret-color:#00E5FF; }
        .dash-folder-btn { background:transparent; border:1px solid var(--border-light);
                           color:var(--text-muted); padding:6px 13px; border-radius:5px;
                           font-size:11px; cursor:pointer; transition:.15s; white-space:nowrap; }
        .dash-folder-btn:hover { background:var(--border-main); color:var(--text-main); }
        .dash-folder-display { font-size:10px; color:var(--text-muted); max-width:200px;
                               overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* ── GRID ─────────────────────────────────────────────────── */
        .dash-body { flex:1; overflow-y:auto; padding:18px 20px; }
        .dash-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px; }
        .proj-card {
            background:var(--bg-surface); border:1px solid var(--border-main);
            border-radius:8px; padding:16px 16px 14px; cursor:pointer;
            transition:all .15s; display:flex; flex-direction:column; gap:8px;
            position:relative;
        }
        .proj-card:hover { border-color:var(--accent); transform:translateY(-2px);
                           box-shadow:0 6px 20px rgba(0,0,0,.25); }
        [data-style^="holo"] .proj-card:hover { box-shadow:0 0 20px rgba(0,229,255,.1); }
        .pc-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
        .pc-title { font-size:14px; font-weight:700; color:var(--text-main); line-height:1.3;
                    flex:1; word-break:break-word; }
        .pc-open-btn { background:var(--accent-bg); border:1px solid var(--accent);
                       color:var(--accent); padding:3px 10px; border-radius:4px;
                       font-size:10px; font-weight:700; cursor:pointer; white-space:nowrap;
                       flex-shrink:0; transition:.15s; }
        .pc-open-btn:hover { background:var(--accent); color:var(--bg-main); }
        .pc-meta { display:flex; flex-direction:column; gap:3px; }
        .pc-row { display:flex; justify-content:space-between; font-size:10px; color:var(--text-muted); }
        .pc-row span:last-child { color:var(--text-main); opacity:.75; font-variant-numeric:tabular-nums; }
        .pc-path { font-size:9px; color:var(--text-muted); opacity:.5; overflow:hidden;
                   text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }

        /* Empty state */
        .dash-empty { display:flex; flex-direction:column; align-items:center; justify-content:center;
                      flex:1; gap:10px; color:var(--text-muted); font-size:12px; text-align:center;
                      padding:40px 20px; line-height:1.6; }
        .dash-empty-icon { font-size:36px; opacity:.25; }

        /* ── RESIZE ZONES ──────────────────────────────────────────── */
        .resize-r  { position:fixed; right:0; top:48px; width:12px; height:calc(100vh - 48px); cursor:ew-resize; z-index:99999; }
        .resize-b  { position:fixed; bottom:0; left:0; width:100vw; height:12px; cursor:ns-resize; z-index:99999; }
        .resize-br { position:fixed; bottom:0; right:0; width:20px; height:20px; cursor:nwse-resize; z-index:100000; }
    </style>
    <script>
    (function(){var m=window._injectedHoloMode||'off';if(m!=='off')document.documentElement.setAttribute('data-style',m);})();
    </script>
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="pywebview-drag-region" style="-webkit-app-region:drag;flex-grow:1;height:100%;display:flex;align-items:center;gap:8px;cursor:default;">
            <span style="color:var(--accent);font-weight:bold;letter-spacing:1px;font-size:12px;">🗂 PROJECT DASHBOARD</span>
        </div>
        <div style="display:flex;align-items:center;height:48px;-webkit-app-region:no-drag;">
            <button class="wc-btn" onclick="minDash()">─</button>
            <button class="wc-btn" onclick="maxDash()">□</button>
            <button class="wc-btn wc-close" onclick="closeDash()">✕</button>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="dash-toolbar">
        <input class="dash-search" id="dash-search" type="text" placeholder="Filter projects…" oninput="_filterCards()">
        <div class="dash-folder-display" id="folder-display">No folder selected</div>
        <button class="dash-folder-btn" onclick="_chooseFolder()">Choose Folder…</button>
        <button class="dash-folder-btn" onclick="_refreshCards()" title="Refresh">↻ Refresh</button>
    </div>

    <!-- GRID -->
    <div class="dash-body" id="dash-body">
        <div class="dash-empty" id="dash-empty">
            <div class="dash-empty-icon">🗂</div>
            <div><strong>No projects folder selected.</strong><br>
            Click <em>Choose Folder…</em> to point to the directory where your .inkwell projects live.</div>
        </div>
        <div class="dash-grid" id="dash-grid" style="display:none;"></div>
    </div>

    <!-- RESIZE ZONES -->
    <div class="resize-r"  onmousedown="initResize(event,2)"></div>
    <div class="resize-b"  onmousedown="initResize(event,6)"></div>
    <div class="resize-br" onmousedown="initResize(event,8)"></div>

    <script>
        window.syncTheme = function(t) {
            if (t==='dark') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme',t);
        };
        window.syncHoloMode = function(m) {
            if (!m||m==='off') document.documentElement.removeAttribute('data-style');
            else document.documentElement.setAttribute('data-style',m);
        };
        function minDash()   { if(window.pywebview) window.pywebview.api.minimize_satellite('Project Dashboard'); }
        function maxDash()   { if(window.pywebview) window.pywebview.api.maximize_satellite('Project Dashboard'); }
        function closeDash() { if(window.pywebview) window.pywebview.api.close_satellite_window('Project Dashboard'); }

        var _allCards  = [];
        var _folder    = '';

        function _fmt(n) {
            if (!n) return '0';
            if (n>=1000000) return (n/1000000).toFixed(1)+'M';
            if (n>=1000)    return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
            return String(n);
        }

        async function _chooseFolder() {
            var result = await window.pywebview.api.pick_backup_folder();  // reuse folder picker
            // Actually need a dedicated folder picker — fall back to using backup folder picker
            // (The API only has pick_backup_folder; we'll repurpose it here for scanning)
            if (!result) return;
            _folder = result;
            document.getElementById('folder-display').textContent = _folder.split(/[\\/]/).slice(-2).join('/');
            _refreshCards();
        }

        async function _refreshCards() {
            if (!_folder) return;
            var result = await window.pywebview.api.scan_projects_folder(_folder);
            if (!result.success) {
                _allCards = [];
                _renderCards(_allCards);
                return;
            }
            _allCards = result.cards || [];
            _renderCards(_allCards);
        }

        function _filterCards() {
            var q = document.getElementById('dash-search').value.toLowerCase();
            var filtered = q ? _allCards.filter(function(c){return c.title.toLowerCase().includes(q);}) : _allCards;
            _renderCards(filtered);
        }

        function _renderCards(cards) {
            var grid  = document.getElementById('dash-grid');
            var empty = document.getElementById('dash-empty');
            grid.innerHTML = '';

            if (cards.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'flex';
                if (_folder) {
                    empty.innerHTML = '<div class="dash-empty-icon">📭</div><div>No .inkwell projects found in this folder.<br><span style="opacity:.6">Make sure your projects are saved here.</span></div>';
                }
                return;
            }

            empty.style.display = 'none';
            grid.style.display  = 'grid';

            cards.forEach(function(card) {
                var div = document.createElement('div');
                div.className = 'proj-card';
                div.innerHTML =
                    '<div class="pc-header">' +
                        '<div class="pc-title">' + _esc(card.title) + '</div>' +
                        '<button class="pc-open-btn" onclick="_openProject(' + JSON.stringify(card.meta_file) + ');event.stopPropagation()">Open</button>' +
                    '</div>' +
                    '<div class="pc-meta">' +
                        '<div class="pc-row"><span>Words</span><span>' + _fmt(card.words) + '</span></div>' +
                        '<div class="pc-row"><span>Chapters</span><span>' + card.chapters + '</span></div>' +
                        '<div class="pc-row"><span>Modified</span><span>' + _esc(card.modified) + '</span></div>' +
                    '</div>' +
                    '<div class="pc-path">' + _esc(card.path) + '</div>';
                div.onclick = function() { _openProject(card.meta_file); };
                grid.appendChild(div);
            });
        }

        function _esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        async function _openProject(metaPath) {
            if (!metaPath) return;
            var result = await window.pywebview.api.open_project_from_dashboard(metaPath);
            if (result && result.success) {
                closeDash();
            } else {
                alert('Could not open project: ' + (result && result.error || 'Unknown error'));
            }
        }

        /* Load from pywebviewready */
        window.addEventListener('pywebviewready', function() {
            // Try to load last-used dashboard folder from app config
            window.pywebview.api.get_backup_settings().then(function(s){
                // Reuse backup folder as default scan directory if set
                if (s && s.folder) {
                    _folder = s.folder;
                    var parts = _folder.split(/[\\/]/);
                    document.getElementById('folder-display').textContent = parts.slice(-2).join('/');
                    _refreshCards();
                }
            }).catch(function(){});
        });

        /* ── Resize engine ─────────────────────────────────────────── */
        var _isResizing=false,_resDir=0,_busy=false,_offX=0,_offY=0;
        function initResize(e,dir){_isResizing=true;_resDir=dir;_offX=window.innerWidth-e.clientX;_offY=window.innerHeight-e.clientY;document.addEventListener('mousemove',_doResize);document.addEventListener('mouseup',_stopResize);e.preventDefault();}
        function _doResize(e){if(!_isResizing||_busy||!window.pywebview)return;_busy=true;var nW=window.innerWidth,nH=window.innerHeight;if(_resDir===2||_resDir===8)nW=e.clientX+_offX;if(_resDir===6||_resDir===8)nH=e.clientY+_offY;var sc=window.devicePixelRatio||1;window.pywebview.api.resize_satellite('Project Dashboard',Math.round(nW*sc),Math.round(nH*sc)).then(function(){_busy=false;}).catch(function(){_busy=false;});}
        function _stopResize(){_isResizing=false;document.removeEventListener('mousemove',_doResize);document.removeEventListener('mouseup',_stopResize);}
    </script>
</body>
</html>
